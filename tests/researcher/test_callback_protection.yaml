name: Researcher Callback Protection Tests
version: v0.2.0
description: 回调机制保护措施的测试用例，验证次数限制、冷却时间、自动升级等逻辑

tests:
  - name: 正常回调不超过3次
    input:
      max_callbacks: 3
      callbacks_triggered: 2
      request: "缺少边界条件说明"
    expected:
      should_allow: true
      new_count: 3
      auto_escalate: false

  - name: 第4次回调被拒绝
    input:
      max_callbacks: 3
      callbacks_triggered: 3
      request: "再次缺少信息"
    expected:
      should_allow: false
      error_type: MaxCallbacksReachedError
      message: "已达回调上限(3次)，建议人工review"

  - name: 冷却期内重复请求被拒绝
    input:
      cooldown_seconds: 60
      last_callback_time: "2026-05-01T10:00:00Z"
      current_time: "2026-05-01T10:30:00Z"
      request: "补充示例"
    expected:
      should_allow: false
      wait_seconds: 30
      error_type: CooldownNotExpiredError

  - name: 冷却期过后允许回调
    input:
      cooldown_seconds: 60
      last_callback_time: "2026-05-01T10:00:00Z"
      current_time: "2026-05-01T11:05:00Z"
      request: "补充API文档"
    expected:
      should_allow: true
      new_count: 1

  - name: 达到自动升级阈值
    input:
      max_callbacks: 3
      callbacks_triggered: 1
      auto_escalate_threshold: 2
      request: "需要更多细节"
    expected:
      should_allow: true
      new_count: 2
      auto_escalate: true
      escalation_message: "⚠️ 已触发自动升级建议（第2次回调）"

  - name: 回调历史记录验证
    input:
      callback_history_log: true
      callbacks_triggered: 0
      request: "确认版本号"
      trigger_stage: "analyzer"
    expected:
      should_allow: true
      history_recorded: true
      history_entry:
        timestamp: "{当前ISO时间}"
        trigger_stage: "analyzer"
        request_content: "确认版本号"
        result: "补充完成"

  - name: 边界值测试 - 刚好达到上限
    input:
      max_callbacks: 3
      callbacks_triggered: 2
      request: "最后一次补充"
    expected:
      should_allow: true
      new_count: 3
      is_last_callback: true
      warning: "⚠️ 这是最后一次回调机会"

  - name: 边界值测试 - 超过上限1次
    input:
      max_callbacks: 3
      callbacks_triggered: 4
      request: "超限请求"
    expected:
      should_allow: false
      error_type: MaxCallbacksReachedError
      current_count: 4
      limit_exceeded_by: 1

test_metadata:
  created_at: 2026-05-01
  coverage_target: "callback_protection"
  priority: P0
  related_task: T2.1
  acceptance_criteria:
    - 所有测试用例通过
    - 覆盖正常流程、边界值、异常情况
