name: Analyzer Unit Tests
version: v0.2.0
description: Analyzer 技术分析逻辑单元测试

tests:
  - name: 简单技能分析-单一功能
    input:
      technology: "git-commit"
      documentation_url: "https://git-scm.com/doc/git-commit"
      analysis_scope: "single-command"
    expected:
      complexity: "simple"
      estimated_lines: "<200"
      recommended_type: "light-thin"
      analysis_time: "~5min"
    priority: P1

  - name: 复杂框架分析-多模块
    input:
      technology: "vue-framework"
      documentation_url: "https://vuejs.org/guide/"
      analysis_scope: "full-framework"
      sub_modules: ["core", "router", "state", "build-tools"]
    expected:
      complexity: "complex"
      estimated_lines: ">800"
      recommended_type: "heavy-thick"
      analysis_time: "~15min"
    priority: P1

  - name: 完整度评估-达到80%阈值
    input:
      collected_info_score: 85
      technical_details_score: 80
      usage_scenarios_score: 75
    expected:
      overall_completeness: 80
      meets_threshold: true
      can_proceed_to_planner: true
    priority: P0

test_metadata:
  total_tests: 3
  coverage_target: "analyzer_analysis"
  created_at: 2026-05-01
