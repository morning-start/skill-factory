name: Planner Unit Tests
version: v0.2.0
description: Planner 类型判定逻辑的单元测试

tests:
  # ========== 四维类型判定 ==========
  - name: 单一功能+短内容 → Type1 (轻+薄)
    input:
      capabilities_count: 1
      estimated_lines: 200
      complexity: "simple"
      examples_count: 2
    expected:
      type: "light-thin"
      type_code: 1
      recommended_path: "fast_path"
    priority: P0
    related_task: T2.3

  - name: 多模块+短内容 → Type2 (重+薄)
    input:
      capabilities_count: 5
      estimated_lines: 150  # 协调器
      complexity: "multi-module"
      can_split: true
    expected:
      type: "heavy-thin"
      type_code: 2
      recommended_path: "standard_path"
      output_structure: "skills/ with sub-skills"
    priority: P0

  - name: 单一功能+长内容 → Type3 (轻+厚)
    input:
      capabilities_count: 1
      estimated_lines: 500  # >300行
      complexity: "complex-single"
      needs_references: true
    expected:
      type: "light-thick"
      type_code: 3
      recommended_path: "standard_path"
      output_structure: "SKILL.md + references/"
    priority: P0

  - name: 多模块+长内容 → Type4 (重+厚)
    input:
      capabilities_count: 8
      estimated_lines: 1200  # 大型技能族
      complexity: "complex-multi"
      needs_references: true
      has_sub_skills: true
    expected:
      type: "heavy-thick"
      type_code: 4
      recommended_path: "full_path"
      output_structure: "skills/ + references/"
    priority: P0

  # ========== 边界值测试 ==========
  - name: 边界值: 刚好300行判定为薄
    input:
      capabilities_count: 2
      estimated_lines: 300  # 边界值
      complexity: "medium"
    expected:
      content_dimension: "thin"  # <=300 为薄
      type: "light-thin"  # 假设功能维度为轻
    priority: P1
    tags: [boundary]

test_metadata:
  total_tests: 5
  coverage_target: "planner_type_decision"
  created_at: 2026-05-01
