name: Publisher Version Unit Tests
version: v0.2.0
description: Publisher-Version 版本判定逻辑单元测试

tests:
  # ========== 版本类型判定 (T2.4) ==========
  - name: Fix变更-patch递增
    input:
      change_type: "fix"
      changes:
        - "修正错别字"
        - "优化描述文字"
      current_version: "v0.1.0"
    expected:
      new_version: "v0.1.1"
      increment: "patch"
      semver_change: [0, 0, 1]
    priority: P0
    related_task: T2.4

  - name: Feature变更-minor递增
    input:
      change_type: "feature"
      changes:
        - "新增JSON输出支持"
        - "补充GitHub Actions集成示例"
      current_version: "v0.2.0"
    expected:
      new_version: "v0.3.0"
      increment: "minor"
      semver_change: [0, 1, 0]
    priority: P0
    related_task: T2.4

  - name: Type Upgrade-minor递增（T1→T2）
    input:
      change_type: "type_upgrade"
      upgrade_path: "light-thin → heavy-thin"
      reason: "拆分为多子技能"
      breaking: false
      current_version: "v0.1.0"
    expected:
      new_version: "v0.2.0"
      increment: "minor"
      is_breaking: false
    priority: P0
    related_task: T2.4

  - name: Breaking变更-major递增
    input:
      change_type: "breaking"
      changes:
        - "删除了YAML输出能力"
        - "修改了input参数结构"
      current_version: "v1.0.0"
    expected:
      new_version: "v2.0.0"
      increment: "major"
      is_breaking: true
      requires_migration_guide: true
    priority: P1
    related_task: T2.4

test_metadata:
  total_tests: 4
  coverage_target: "publisher_version_decision"
  created_at: 2026-05-01
