name: Processing Strategy Unit Tests
version: v0.2.0
description: 加工策略选择逻辑单元测试 (T2.2)

tests:
  # ========== 策略选择 ==========
  - name: >500行选择精简优先策略
    input:
      current_line_count: 600
      content_quality: "redundant"
      repetition_level: "high"
    expected:
      selected_strategy: "simplify-first"
      first_processor: "simplifier"
      expected_line_reduction: "20-40%"
    priority: P0
    related_task: T2.2

  - name: <200行选择丰富优先策略
    input:
      current_line_count: 150
      content_quality: "sparse"
      example_count: 1  # <2
    expected:
      selected_strategy: "enrich-first"
      first_processor: "enricher"
      expected_line_increase: "100-150%"
    priority: P0
    related_task: T2.2

  - name: 200-500行选择均衡模式
    input:
      current_line_count: 350
      content_quality: "acceptable"
      needs_refinement: true
    expected:
      selected_strategy: "balanced"
      processors: ["simplifier", "enricher", "beautifier", "standardizer"]
      estimated_time: "2.5-3.5h"
    priority: P0
    related_task: T2.2

  # ========== 循环检测 (T2.2) ==========
  - name: 检测到enrich-simplify循环
    input:
      processing_history:
        - round: 1
          operations: ["enrich(+50)", "simplify(-30)"]
          net_change: "+20"
        - round: 2
          operations: ["enrich(+45)", "simplify(-28)"]
          net_change: "+17"
      current_round: 3
      proposed_operations: ["enrich(+48)", "simplify(-29)"]
    expected:
      circular_pattern_detected: true
      pattern_type: "enrich-simplify loop"
      consecutive_occurrences: 3
      should_warn: true
      warning_message: "⚠️ 检测到可能的加工循环（第3轮）"
      recommendation: "当前质量已足够，考虑直接进入发布阶段"
    priority: P0
    related_task: T2.2

  - name: 未检测到循环-正常加工
    input:
      processing_history:
        - round: 1
          operations: ["enrich(+80)"]
          net_change: "+80"
      current_round: 2
      proposed_operations: ["beautify(+10)"]
    expected:
      circular_pattern_detected: false
      can_continue: true
    priority: P1
    related_task: T2.2

test_metadata:
  total_tests: 5
  coverage_target: "processing_strategy_selection"
  created_at: 2026-05-01
