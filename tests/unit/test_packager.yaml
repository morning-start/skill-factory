name: Packager Unit Tests
version: v0.2.0
description: Packager 验证逻辑的单元测试

tests:
  # ========== Type 1 快速验证 (T2.3) ==========
  - name: Type1快速验证通过
    input:
      validation_mode: "quick_check"
      skill_type: "light-thin"
      frontmatter:
        name: "test-skill"
        version: "v0.1.0"
        description: "这是一个测试技能用于验证功能"  # ~20字符，需要100-150
        tags: ["test", "skill", "validation"]
      structure:
        has_skill_md: true
        has_skills_dir: false
        has_references_dir: false
      content:
        line_count: 200  # <300
        example_count: 3  # >=2
    expected:
      passed: true
      quality_score: 85
      validation_mode: "quick"
      time_used: "<=3min"
    priority: P0
    related_task: T2.3

  - name: Type1快速验证-缺少示例
    input:
      validation_mode: "quick_check"
      skill_type: "light-thin"
      structure:
        has_skill_md: true
        has_skills_dir: false
      content:
        line_count: 200
        example_count: 1  # <2
    expected:
      passed: false
      quality_score: 65
      failed_checks: ["at_least_2_examples"]
      action: "返回 generator 补充 or 降级为标准路径"
    priority: P0
    related_task: T2.3

  # ========== 标准验证模式 ==========
  - name: Type2标准验证通过
    input:
      validation_mode: "standard"
      skill_type: "heavy-thin"
      parent_skill:
        has_children_list: true
      skills_dir:
        exists: true
        sub_skill_count: 3
        all_have_skill_md: true
        none_have_references: true
    expected:
      passed: true
      quality_score: 90
      type_check: "passed"
    priority: P1

  - name: Type3标准验证通过
    input:
      validation_mode: "standard"
      skill_type: "light-thick"
      main_file:
        has_index_table: true
        line_count: 150  # 概览
      references_dir:
        exists: true
        file_count: 4  # >=2
        all_links_valid: true
      no_skills_dir: true
    expected:
      passed: true
      quality_score: 88
      references_check: "passed"
    priority: P1

  - name: 质量评分边界值-刚好60分
    input:
      scores:
        structure_integrity: 60
        preamble_completeness: 60
        relationship_correctness: 60
        content_richness: 60
    expected:
      total_score: 60
      grade: "合格"
      action: "通过 + 必须修复项"
    priority: P1
    tags: [boundary, scoring]

test_metadata:
  total_tests: 5
  coverage_target: "packager_validation"
  created_at: 2026-05-01
