name: Researcher Unit Tests
version: v0.2.0
description: Researcher 子技能的核心逻辑单元测试

tests:
  # ========== 回调保护机制 (T2.1) ==========
  - name: 正常回调不超过3次
    input:
      max_callbacks: 3
      callbacks_triggered: 2
      request: "缺少边界条件说明"
    expected:
      should_allow: true
      new_count: 3
      auto_escalate: false
    priority: P0
    related_task: T2.1

  - name: 第4次回调被拒绝
    input:
      max_callbacks: 3
      callbacks_triggered: 3
      request: "再次缺少信息"
    expected:
      should_allow: false
      error_type: MaxCallbacksReachedError
      message: "已达回调上限(3次)，建议人工review"
    priority: P0
    related_task: T2.1

  - name: 冷却期内重复请求被拒绝
    input:
      cooldown_seconds: 60
      last_callback_time: "2026-05-01T10:00:00Z"
      current_time: "2026-05-01T10:30:00Z"
      request: "补充示例"
    expected:
      should_allow: false
      wait_seconds: 30
      error_type: CooldownNotExpiredError
    priority: P0
    related_task: T2.1

  - name: 冷却期过后允许回调
    input:
      cooldown_seconds: 60
      last_callback_time: "2026-05-01T10:00:00Z"
      current_time: "2026-05-01T11:05:00Z"
      request: "补充API文档"
    expected:
      should_allow: true
      new_count: 1
    priority: P1
    related_task: T2.1

  # ========== 快速模式 (T2.3) ==========
  - name: Type1快速模式触发条件检测
    input:
      user_input_length: 300  # < 500字符
      estimated_output_lines: 250  # < 300行
      user_explicit_simple: true
    expected:
      should_use_fast_mode: true
      mode: "fast_research"
    priority: P0
    related_task: T2.3

  - name: 非Type1不使用快速模式
    input:
      user_input_length: 800  # > 500字符
      estimated_output_lines: 400  # > 300行
      user_explicit_simple: false
    expected:
      should_use_fast_mode: false
      mode: "standard_research"
    priority: P1
    related_task: T2.3

  # ========== 缺失信息检测 ==========
  - name: 检测到基础信息缺失
    input:
      collected_info:
        technology_name: null
        official_doc: "https://example.com"
        version: "v1.0.0"
    expected:
      has_missing: true
      missing_items: ["technology_name"]
      missing_level: "critical"
    priority: P0

  - name: 信息完整无缺失
    input:
      collected_info:
        technology_name: "Example Tech"
        official_doc: "https://example.com"
        version: "v2.0.0"
        api_doc: "https://example.com/api"
        config_example: "有"
    expected:
      has_missing: false
      missing_items: []
      completeness_score: 100
    priority: P1

  - name: 仅缺失可选信息
    input:
      collected_info:
        technology_name: "Test Tool"
        official_doc: "https://test.com"
        version: "v1.0.0"
        best_practices: null  # 可选
        faq: null  # 可选
    expected:
      has_missing: false  # 必填项齐全
      optional_missing: ["best_practices", "faq"]
      can_proceed: true
    priority: P1

test_metadata:
  total_tests: 9
  coverage_target: "researcher_core_logic"
  created_at: 2026-05-01
