# Assembler 特殊说明

## 批量验证支持

Assembler 支持合并/拆分后的**批量验证**：
- 自动运行全量审计 (`audit.ps1 -Project`)
- 触发 Stocktake 健康扫描
- 生成验证报告

详细流程请查看：
[SKILL.md#批量验证](../../skills/skill-factory-assembler/SKILL.md)

