# Publisher 特殊说明

## 手动触发特性

Publisher 设置了 `disable-model-invocation: true`：
- **必须由用户显式调用**（如 `/publisher`）
- **不会自动被模型触发**
- **适用于需要人工确认的关键操作**

## CI/CD 集成

Publisher 支持 GitHub Actions 自动发布：
- 详见 [SKILL.md#CI/CD](../../skills/skill-factory-publisher/SKILL.md)

