# Router 特殊说明

## 触发特点

作为 **Router Pattern** 技能，skill-factory 的触发行为特殊：

1. **总是被触发**: 当用户提到任何与技能生命周期相关的操作时
2. **分发而非执行**: 触发后立即将请求转发到对应的子技能
3. **透明代理**: 用户可能不知道路由器的存在

## 测试建议

由于 Router 特性，建议：
- 正例测试重点验证**路由准确性**（是否分发到正确的子技能）
- 负例测试重点验证**不干扰**其他技能的触发

